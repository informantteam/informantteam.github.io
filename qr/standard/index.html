<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Galaxy QR Generator Pro</title>

<script src="https://unpkg.com/qr-code-styling/lib/qr-code-styling.js"></script>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Segoe UI', sans-serif;
}

body {
    min-height: 100vh;
    background: radial-gradient(circle at top, #0f2027, #1a2a3a, #000);
    display: flex;
    justify-content: center;
    align-items: center;
    color: white;
    overflow-x: hidden;
    padding: 20px;
}

/* efek bintang */
body::before {
    content: "";
    position: absolute;
    width: 200%;
    height: 200%;
    background: url('https://www.transparenttextures.com/patterns/stardust.png');
    animation: moveStars 80s linear infinite;
    opacity: 0.3;
}

@keyframes moveStars {
    from { transform: translate(0,0); }
    to { transform: translate(-600px,-600px); }
}

.container {
    position: relative;
    width: 100%;
    max-width: 380px;
    padding: 25px;
    border-radius: 20px;
    background: rgba(255,255,255,0.05);
    backdrop-filter: blur(20px);
    box-shadow: 0 0 30px rgba(0,255,255,0.2);
    text-align: center;
}

h2 {
    font-size: 20px;
    margin-bottom: 12px;
    color: #00eaff;
    text-shadow: 0 0 10px #00eaff;
}

input {
    width: 100%;
    padding: 12px;
    margin: 6px 0;
    border-radius: 10px;
    border: none;
    outline: none;
    background: rgba(255,255,255,0.1);
    color: white;
    font-size: 14px;
}

input::placeholder {
    color: #bbb;
}

button {
    width: 100%;
    padding: 14px;
    margin-top: 8px;
    border-radius: 10px;
    border: none;
    background: linear-gradient(45deg, #00eaff, #8a2be2);
    color: white;
    font-weight: bold;
    font-size: 14px;
    cursor: pointer;
    transition: 0.3s;
}

button:active {
    transform: scale(0.97);
}

.download-btn {
    background: linear-gradient(45deg, #00ffcc, #00c3ff);
}

#qr {
    margin-top: 20px;
    padding: 10px;
    background: white;
    border-radius: 15px;
    display: inline-block;
    max-width: 100%;
}

/* 📱 Khusus layar kecil */
@media (max-width: 480px) {
    h2 {
        font-size: 18px;
    }

    input, button {
        font-size: 13px;
        padding: 12px;
    }

    .container {
        padding: 20px;
    }
}
</style>
</head>

<body>

<div class="container">
    <h2>QR Generator Pro</h2>

    <input type="text" id="linkInput" placeholder="Masukkan link">
    <input type="file" id="logoInput" accept="image/*">

    <button onclick="generateQR()">Generate QR</button>
    <button class="download-btn" onclick="downloadQR()">⬇ Download QR</button>

    <div id="qr"></div>
</div>

<script>
let qrCode;
let currentColor = "#000000"; // simpan warna QR

function getDominantColor(img, callback) {
    const canvas = document.createElement("canvas");
    const ctx = canvas.getContext("2d");

    canvas.width = img.width;
    canvas.height = img.height;

    ctx.drawImage(img, 0, 0);

    const data = ctx.getImageData(0, 0, canvas.width, canvas.height).data;

    let r = 0, g = 0, b = 0, count = 0;

    for (let i = 0; i < data.length; i += 4) {
        r += data[i];
        g += data[i + 1];
        b += data[i + 2];
        count++;
    }

    r = Math.floor(r / count);
    g = Math.floor(g / count);
    b = Math.floor(b / count);

    callback(`rgb(${r},${g},${b})`);
}

function generateQR() {
    const link = document.getElementById("linkInput").value;
    const file = document.getElementById("logoInput").files[0];

    if (!link) {
        alert("Masukkan link!");
        return;
    }

    document.getElementById("qr").innerHTML = "";

    const baseOptions = {
        width: 260,
        height: 260,
        data: link,
        image: "",
        qrOptions: {
            errorCorrectionLevel: "H"
        },
        imageOptions: {
            crossOrigin: "anonymous",
            margin: 5,
            imageSize: 0.22
        },
        backgroundOptions: {
            color: "#ffffff"
        }
    };

    if (file) {
        const reader = new FileReader();
        reader.onload = function(e) {
            const logoImg = new Image();
            logoImg.src = e.target.result;

            logoImg.onload = () => {
                getDominantColor(logoImg, (color) => {
                    currentColor = color;

                    const options = {
                        ...baseOptions,
                        image: e.target.result,
                        dotsOptions: {
                            color: color,
                            type: "rounded"
                        }
                    };

                    qrCode = new QRCodeStyling(options);
                    qrCode.append(document.getElementById("qr"));
                });
            };
        };
        reader.readAsDataURL(file);
    } else {
        currentColor = "#000000";

        const options = {
            ...baseOptions,
            dotsOptions: {
                color: currentColor,
                type: "rounded"
            }
        };

        qrCode = new QRCodeStyling(options);
        qrCode.append(document.getElementById("qr"));
    }
}

function downloadQR() {
    const link = document.getElementById("linkInput").value;
    const file = document.getElementById("logoInput").files[0];

    if (!link) {
        alert("Generate QR dulu!");
        return;
    }

    const optionsHD = {
        width: 1800, // HD banget
        height: 1800,
        data: link,
        image: "",
        qrOptions: {
            errorCorrectionLevel: "H"
        },
        imageOptions: {
            crossOrigin: "anonymous",
            margin: 10,
            imageSize: 0.22
        },
        dotsOptions: {
            color: currentColor,
            type: "rounded"
        },
        backgroundOptions: {
            color: "#ffffff"
        }
    };

    if (file) {
        const reader = new FileReader();
        reader.onload = function(e) {
            optionsHD.image = e.target.result;

            const qrHD = new QRCodeStyling(optionsHD);
            qrHD.download({
                name: "qr-hd",
                extension: "png"
            });
        };
        reader.readAsDataURL(file);
    } else {
        const qrHD = new QRCodeStyling(optionsHD);
        qrHD.download({
            name: "qr-hd",
            extension: "png"
        });
    }
}
</script>

</body>
</html>
